<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Merge+1 AI 研究モード</title>
    <link rel="stylesheet" href="style.css">
    <script src="ai.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Merge+1 AI 研究モード（4×4）</h1>

    <div id="controls">
        <button id="resetBtn">リセット</button>
        <button id="clearBtn">盤面クリア</button>
    </div>

<div id="tileSelector">
    <div class="selectTile tile-1" data-value="1">1</div>
    <div class="selectTile tile-2" data-value="2">2</div>
    <div class="selectTile tile-3" data-value="3">3</div>
    <div class="selectTile tile-4" data-value="4">4</div>
    <div class="selectTile tile-5" data-value="5">5</div>
    <div class="selectTile tile-6" data-value="6">6</div>
    <div class="selectTile tile-delete" data-value="">消</div>
</div>
    
    <div id="gameWrapper">
        <div id="game"></div>
    </div>

    <div id="arrows">
        <span id="arrowUp" class="arrow">▲</span>
        <span id="arrowLeft" class="arrow">◀</span>
        <span id="arrowRight" class="arrow">▶</span>
        <span id="arrowDown" class="arrow">▼</span>
    </div>

    <p id="aiMessage">AI 推奨手：未計算</p>
    <p class="note">
        セルをクリックすると、任意の数字（1〜4）のタイルを配置できます。<br>
        タイルはランダム出現せず、すべて手動配置です。
    </p>
    
</body>
</html>
