<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Merge+1 AI 研究モード</title>
    <link rel="stylesheet" href="style.css">
    <script src="ai.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Merge+1 AI 研究モード（4×4）</h1>

    <div id="controls">
        <button id="resetBtn">リセット</button>
        <button id="clearBtn">盤面クリア</button>
        <button id="aiSuggestBtn">AI 推奨手を計算</button>
    </div>

    <div id="gameWrapper">
        <div id="game"></div>
    </div>

    <div id="arrows">
        <span id="arrowUp" class="arrow">▲</span>
        <span id="arrowLeft" class="arrow">◀</span>
        <span id="arrowRight" class="arrow">▶</span>
        <span id="arrowDown" class="arrow">▼</span>
    </div>

    <p id="aiMessage">AI 推奨手：未計算</p>
    <p class="note">
        セルをクリックすると、任意の数字（1〜4）のタイルを配置できます。<br>
        タイルはランダム出現せず、すべて手動配置です。
    </p>
    
    <select id="tileSelect" style="display:none; position:absolute; z-index:10;">
        <option value="">空にする</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
    </select>
</body>
</html>
