<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Merge+1 AI 研究モード</title>
    <link rel="stylesheet" href="style.css">
    <script src="ai.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Merge+1 AI 研究モード（4×4）</h1>

    <div id="controls">
        <button id="resetBtn">リセット</button>
        <button id="clearBtn">盤面クリア</button>
    </div>

    <div id="tileSelector">
        <div class="selectTile tile-1" data-value="1">1</div>
        <div class="selectTile tile-2" data-value="2">2</div>
        <div class="selectTile tile-3" data-value="3">3</div>
        <div class="selectTile tile-4" data-value="4">4</div>
        <div class="selectTile tile-5" data-value="5">5</div>
        <div class="selectTile tile-6" data-value="6">6</div>
        <div class="selectTile tile-delete" data-value="">消</div>
    </div>

    <!-- ★ 盤面を囲む矢印レイアウト -->
    <div id="gameArea">

        <!-- 上矢印 -->
        <div id="arrowUp" class="arrow">▲</div>

        <div class="middleRow">
            <!-- 左矢印 -->
            <div id="arrowLeft" class="arrow">◀</div>

            <!-- 盤面 -->
            <div id="gameWrapper">
                <div id="game"></div>
            </div>

            <!-- 右矢印 -->
            <div id="arrowRight" class="arrow">▶</div>
        </div>

        <!-- 下矢印 -->
        <div id="arrowDown" class="arrow">▼</div>

    </div>

    <p id="aiMessage">AI 推奨手：未計算</p>
    <p class="note">
        セルをクリックすると、任意の数字（1〜6）のタイルを配置できます。<br>
        「消」を選択するとタイルを削除できます。
    </p>
    
</body>
</html>
