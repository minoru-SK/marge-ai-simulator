<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Merge+1 AI 研究モード</title>
    <link rel="stylesheet" href="style.css">
    <script src="ai.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Merge+1 AI 研究モード（4×4）</h1>

    <div id="controls">
        <button id="moveUpBtn">↑ 上</button>
        <button id="moveLeftBtn">← 左</button>
        <button id="moveRightBtn">→ 右</button>
        <button id="moveDownBtn">↓ 下</button>
        <button id="resetBtn">リセット</button>
        <button id="clearBtn">盤面クリア</button>
        <button id="aiSuggestBtn">AI 推奨手を計算</button>
    </div>

    <div id="boardWrapper">
        <div id="arrowUp" class="arrow">▲</div>
        <div id="arrowLeft" class="arrow">◀</div>
        <div id="game"></div>
        <div id="arrowRight" class="arrow">▶</div>
        <div id="arrowDown" class="arrow">▼</div>
    </div>

    <p id="aiMessage">AI 推奨手：未計算</p>
    <p class="note">
        セルをクリックすると、任意の数字（1〜4）のタイルを配置できます。<br>
        タイルはランダム出現せず、すべて手動配置です。
    </p>
</body>
</html>
